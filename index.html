    <meta charset="UTF-8">

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html,
        body {
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        img {
            /* Prevent haptic touch previews */
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }

        .tooltip::before {
            position: relative;
            content: attr(tooltip);
            color: white;
            white-space: nowrap;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0.5rem;
            z-index: 9999;
            pointer-events: none;
        }

        .disabled {
            cursor: not-allowed;
        }
    </style>

    <!-- XTERM.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.js"

    <!-- NESTED STATE DEMO -->
    <div s-style="{width: getPercent(n, 500) + '%', backgroundColor: 'rgba(59, 130, 246, 0.5)'}"
        class="bg-blue-100/50 border border-dashed border-gray-400 p-5 rounded w-100 m-auto my-10"
        s-state="{count:0, increment(){this.count++}, decrement(){this.count--}}">

        <!-- small bug with using function in directive bindings with signals -->
        <div s-state="Example">
            <input type="number" s-value="amount" on:change="n = $target.value">
            <p s-text="format(amount)"></p>
        </div>

        <p s-text="$store.theme.dark"></p>

        <div class="p-4 bg-blue-100 border-2 border-blue-500 rounded-lg">
            first level count: <span class="font-bold text-blue-600 mx-5" s-text="count"></span>
            <button on:click="increment()" class="py-1 px-2 rounded my-2 bg-white">+</button>
            <button on:click="decrement()" class="py-1 px-2 rounded my-2 bg-white">-</button>

        </div>
        <div s-state="{counter:1}" class="ml-6 mt-4">
            <div class="p-4 bg-purple-100 border-2 border-purple-500 rounded-lg">
                second level counter: <span class="font-bold text-purple-600" s-text="counter"></span> : from first
                level count: <span s-text="count"></span>
                <button on:click="counter++" class="py-1 px-2 rounded my-2 bg-white">+</button>
                <button on:click="counter--" class="py-1 px-2 rounded my-2 bg-white">-</button>
            </div>
            <div class="ml-6 mt-4" s-state="{amount : 2}">
                <div class="p-4 bg-purple-100 border-2 border-purple-500 rounded-lg">
                    second level amount: <span class="font-bold text-purple-600" s-text="amount"></span> : from first
                    level count: <span s-text="count"></span>
                    <button on:click="amount++" class="py-1 px-2 rounded my-2 bg-white">+</button>
                    <button on:click="amount--" class="py-1 px-2 rounded my-2 bg-white">-</button>
                    <button on:click="decrement()" class="py-1 px-2 rounded my-2 bg-white">decrement count from root
                        state</button>

                </div>
            </div>
        </div>
        <button on:click="$store.theme.toggle()" class="py-1 px-2 rounded my-2 bg-white">click
            me</button>
        <p class="text-center mt-5 text-sm text-blue-950">click inside the boxes!</p>
    </div>

                    <!-- OPEN EDITORS -> I WILL LAYER THEM ONE ON TOP OF EACH OTHER (need to find a way to manage z-index of editors) -->

                            <!-- will loop over open files and display an editor with the content of that file(if it can be read else show an error) -->

                                                                    class="absolute -bottom-10 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                                                    <span s-text="file.dimensions || '---'"
                                                                        class="px-3 py-1 bg-slate-800/90 backdrop-blur-md border border-slate-700 rounded-full text-[10px] text-cyan-400 font-mono shadow-xl">
                                                                    </span>
                                                                    <span s-text="file.extension"
                                                                        class="px-3 py-1 bg-slate-800/90 backdrop-blur-md border border-slate-700 rounded-full text-[10px] text-slate-300 font-mono shadow-xl uppercase">
                                                                    </span>
                                                                </div> -->

                                                                                    stroke-width="1.5"
                                                                                    d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                                                                            </svg>

                                                                            class="w-full brightness-90"></audio>

                                                                </div>
                                                                <div
                                                                    class="relative bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl">
                                                                    <svg xmlns="http://www.w3.org/2000/svg"
                                                                        class="w-12 h-12 text-slate-600" fill="none"
                                                                        viewBox="0 0 24 24" stroke="currentColor">
                                                                        <path stroke-linecap="round"
                                                                            stroke-linejoin="round" stroke-width="1.5"
                                                                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                                        <circle cx="18" cy="6" r="4"
                                                                            class="fill-slate-900 stroke-red-500"
                                                                            stroke-width="2" />
                                                                        <path d="M18 4v2m0 2h.01" class="stroke-red-500"
                                                                            stroke-width="2" stroke-linecap="round" />
                                                                    </svg>
                                                                </div>
                                                            </div>

                                                            <h2 class="text-slate-200 font-semibold text-lg mb-2">
                                                                Unsupported
                                                                File
                                                                Type
                                                            </h2>
                                                            <p
                                                                class="text-slate-500 text-sm max-w-xs leading-relaxed mb-8">
                                                                The file <span class="text-cyan-400 font-mono"
                                                                    s-text="file.name">filename.ext</span> is binary or
                                                                uses
                                                                an
                                                                encoding
                                                                that cannot be displayed in the text editor.
                                                            </p>

                                                            <div class="flex flex-col gap-3 w-full max-w-[240px]">
                                                                <!-- on:click="openInSystem(file)" will open in device finder-> will need permissions -->
                                                                <button
                                                                    class="flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-medium rounded-md border border-slate-700 transition-all">
                                                                    <svg class="w-4 h-4" fill="none"
                                                                        stroke="currentColor" viewBox="0 0 24 24">
                                                                        <path
                                                                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                                                    </svg>
                                                                    Open in System Explorer
                                                                </button>

                                                                <button on:click="closeTab(file)"
                                                                    class="text-slate-500 hover:text-slate-300 text-[11px] font-medium transition-colors">
                                                                    Close this tab
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                        <div>

                                        </div>
                                    </div>

                                </div>
                            </template>
                            <!-- TERMINAL AREA AND LOGS -->
                            <div s-state="{activeBottomTab: 'terminal'}" s-show="showTerminal"
                                class="h-64  flex flex-col bg-slate-950 border-t border-slate-800 shrink-0">
                                <!-- bottom tab toggle -->
                                <div
                                    class="h-9 flex items-center px-4 bg-slate-900/30 border-b border-slate-800 shrink-0 justify-between">
                                    <!-- tab button toggle -->
                                    <div class="flex items-center gap-4">
                                        <button on:click="activeBottomTab = 'terminal'"
                                            class="text-[10px] font-bold uppercase tracking-widest h-full flex items-center pt-1 pb-2 transition-all border-b-2"
                                            s-class="activeBottomTab === 'terminal' ? 'text-cyan-500 border-cyan-500' : 'text-slate-500 border-transparent hover:text-slate-300'">
                                            Terminal
                                        </button>

                                        <button on:click="activeBottomTab = 'output'"
                                            class="text-[10px] font-bold uppercase tracking-widest h-full flex items-center pt-1 pb-2 transition-all border-b-2"
                                            s-class="activeBottomTab === 'output' ? 'text-cyan-500 border-cyan-500' : 'text-slate-500 border-transparent hover:text-slate-300'">
                                            Output
                                            <span s-show="outputLogs.length > 0"
                                                class="ml-1 text-xs bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded-full"
                                                s-text="outputLogs.length">
                                                3
                                        </button>
                                    </div>
                                    <button on:click="showTerminal = false"
                                        class="text-slate-600 hover:text-slate-300 p-1">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path d="M19 9l-7 7-7-7" />
                                        </svg>
                                    </button>
                                </div>
                                <!-- terminal -->
                                <div s-show="activeBottomTab === 'terminal' " s-ref="terminal" id="terminal-container"
                                    class="flex-1 p-3 overflow-hidden font-mono text-sm selection:bg-cyan-500/30">
                                </div>
                                <!-- output logs-->
                                <div s-show="activeBottomTab === 'output' "
                                    class="flex flex-1 flex-col font-mono text-[11px] p-2 gap-1 overflow-y-auto">
                                    <template s-for="log in outputLogs">
                                        <div class="group flex items-start gap-3 px-3 py-1 hover:bg-slate-900/50 transition-colors border-l-2 border-transparent"
                                            s-class="log.type === 'error' ? 'hover:border-red-500/50 bg-red-500/5' : (log.type === 'warn' ? 'hover:border-amber-500/50 bg-amber-500/5' : 'hover:border-cyan-500/50')">

                                            <span class="shrink-0">
                                                <span
                                                    class="text-[9px] px-1.5 py-0.5 rounded-md font-bold uppercase tracking-wider bg-slate-900 border border-slate-800"
                                                    s-class="log.type === 'error' ? 'text-red-400 border-red-900/30' : 'text-cyan-500 border-cyan-900/30'"
                                                    s-text="log.source">
                                                    SYSTEM
                                                </span>
                                            </span>

                                            <span class="text-xs font-mono leading-relaxed break-all"
                                                s-class="log.type === 'error' ? 'text-red-300' : 'text-slate-300'"
                                                s-text="log.message">
                                                Container process started successfully.
                                            </span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        <!-- preview -->
                        <aside s-show="showPreview"
                            class="w-[400px] flex flex-col bg-slate-900 border-l border-slate-800">
                            <div
                                class="h-9 flex items-center justify-between px-4 bg-slate-900 border-b border-slate-800 shrink-0">
                                <div class="flex items-center gap-2">
                                    <span
                                        class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Preview</span>
                                </div>
                                <button on:click="refreshPreview" aria-label="Refresh Preview"
                                    class="p-1 hover:bg-slate-800 rounded text-slate-400 hover:text-cyan-400 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                </button>
                            </div>

                            <div class="flex-1 bg-white relative">
                                <iframe s-ref="preview" id="preview-iframe"
                                    class="w-full h-full border-none shadow-inner" s-src="previewUrl"></iframe>

                                <div s-show="!previewUrl"
                                    class="absolute inset-0 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm">
                                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em]">Waiting for
                                        server...
                                    </p>
                                </div>
                            </div>
                        </aside>

                    </main>
                </div>

                <footer
                    class="h-6 bg-cyan-700 text-white flex items-center justify-between px-3 text-[10px] font-medium shrink-0">
                    <div class="flex gap-4">
                        <span class="flex items-center gap-1"><span
                                class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
                            Connected</span>
                        <span id="charCount">0 characters</span>
                    </div>
                    <div class="flex gap-4">
                        <span>UTF-8</span>
                        <span class="font-bold">Markdown</span>
                    </div>
                </footer>
            </div>
        </div>
    </template>

</body>

<script type="module" src="./index.js"></script>
</html>
