<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shadow Dom</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html,
        body {
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        img {
            /* Prevent haptic touch previews */
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }

        .tooltip::before {
            position: relative;
            content: attr(tooltip);
            color: white;
            white-space: nowrap;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0.5rem;
            z-index: 9999;
            pointer-events: none;
        }

        .disabled {
            cursor: not-allowed;
        }
    </style>

</head>

    <!-- another demo -->
    <div id="app" s-state="{ 
                newTask: '', 
                filter: 'all',
                tasks: [
                    { id: 1, text: 'Master Shadow Realm Proxies', done: true },
                    { id: 2, text: 'Fix Nested s-for Scoping', done: false }
                ] 

            }" s-class="$store.theme.dark ? 'bg-slate-950 text-slate-200' : 'bg-slate-50 text-slate-900'"
        class="min-h-screen p-4 md:p-12 antialiased transition-colors duration-500">

        <div class="max-w-xl mx-auto space-y-8">
            <header s-class="$store.theme.dark ? 'border-slate-800' : 'border-slate-200'"
                class="flex items-end justify-between border-b border-slate-800 pb-6">
                <div>
                    <h1 s-class="$store.theme.dark ? 'text-white' : 'text-slate-900'"
                        class="text-4xl font-black tracking-tighter text-white">TASKS</h1>
                    <p class="text-slate-500 text-sm font-mono mt-1">Reactive State Management</p>
                    <button on:click="$store.theme.dark = !$store.theme.dark"
                        class="mt-2 text-[10px] uppercase tracking-[0.2em] font-bold px-3 py-1 rounded-full border transition-all"
                        s-class="$store.theme.dark ? 'border-slate-700 hover:bg-slate-800 text-slate-400' : 'border-slate-300 hover:bg-slate-100 text-slate-600'">
                        Switch to <span s-text="$store.theme.dark ? 'Light' : 'Dark'"></span> Mode
                    </button>
                </div>
                <div class="text-right">
                    <span class="text-3xl font-mono text-cyan-500" s-text="tasks.filter(t => !t.done).length"></span>
                    <p class="text-[10px] uppercase tracking-widest text-slate-600">Pending</p>
                </div>
            </header>

            <div class="relative group">
                <input type="text" s-value="newTask" on:input="newTask = $target.value"
                    on:keydown="$event.key === 'Enter' && newTask.trim() !== '' && (tasks = [...tasks, { id: $uniid(), text: newTask, done: false }], newTask = '')"
                    placeholder="What needs to be done?"
                    class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl px-6 py-4 outline-none focus:border-cyan-500/50 transition-all text-lg text-slate-400 shadow-2xl"
                    s-class="$store.theme.dark ? 'bg-slate-900 border-slate-800 focus:border-cyan-500/50' : 'bg-white border-slate-200 focus:border-cyan-500'" />
                <button
                    on:click="newTask.trim() !== '' && (tasks = [...tasks, { id: $uniid(), text: newTask, done: false }], newTask = '')"
                    class="absolute right-3 top-3 bottom-3 px-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl transition-all active:scale-95 font-bold">
                    ADD
                </button>
            </div>

            <div s-class="$store.theme.dark ? 'bg-slate-900 border-slate-800' : 'bg-slate-100 border-slate-200'"
                class="flex gap-2 p-1 bg-slate-900 rounded-xl border border-slate-800">
                <template s-for="f in ['all', 'active', 'completed']">
                    <button on:click="filter = f" s-class="filter === f 
                        ? ($store.theme.dark ? 'bg-slate-800 text-cyan-400' : 'bg-white text-cyan-600 shadow-sm') 
                        : 'text-slate-500 hover:text-slate-400'"
                        class="flex-1 py-2 rounded-lg text-xs uppercase font-bold tracking-widest transition-all"
                        s-text="f"></button>
                </template>
            </div>

            <div class="space-y-3">
                <template s-for="task in tasks">
                    <div s-hide="filter === 'all' || (filter === 'active' && !task.done) || (filter === 'completed' && task.done)"
                        class="group flex items-center gap-4 bg-slate-900 border border-slate-800 p-4 rounded-2xl hover:border-slate-700 transition-all shadow-sm"
                        s-class="($store.theme.dark ? 'bg-slate-900 border-slate-800 hover:border-slate-700 ' : 'bg-white border-slate-200 hover:border-slate-300 ') + (task.done ? 'opacity-50' : 'opacity-100')">
                        <button on:click="tasks = tasks.map(t => t.id === task.id ? { ...t, done: !t.done } : t)"
                            class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all"
                            s-class="task.done ? 'bg-cyan-500 border-cyan-500' : 'border-slate-700 hover:border-cyan-500'">
                            <span s-hide="task.done" class="text-slate-950 font-bold text-xs">✓</span>
                        </button>

                        <span class="flex-1 text-lg transition-all"
                            s-class="(task.done ? 'line-through text-slate-500 ' : '') + ($store.theme.dark ? 'text-slate-200' : 'text-slate-800')"
                            s-text="task.text"></span>

                        <button on:click="tasks = tasks.filter(t => t.id !== task.id)"
                            class="opacity-0 group-hover:opacity-100 p-2 text-slate-600 hover:text-red-400 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </template>
            </div>

            <footer
                class="flex justify-between items-center text-[10px] text-slate-600 font-mono uppercase tracking-widest px-2">
                <span s-text="`Total Tasks: ${tasks.length}`"></span>
                <button on:click="tasks = tasks.filter(t => !t.done)" class="hover:text-cyan-500 transition-colors"
                    s-hide="tasks.some(t => t.done)">
                    Clear Completed
                </button>
            </footer>
        </div>
    </div>

</body>
